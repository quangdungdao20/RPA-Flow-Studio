version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rpa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rpa_flow_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    container_name: rpa_nats
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222" # HTTP monitoring port

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa_backend
    restart: always
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rpa_flow_studio
      - NATS_URL=nats://nats:4222
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - nats

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpa_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: rpa_worker
    restart: always
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats

volumes:
  postgres_data:
